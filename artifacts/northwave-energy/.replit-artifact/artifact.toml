kind = "web"
previewPath = "/"
title = "NorthWave Energy Drilling"
version = "1.0.0"
id = "artifacts/northwave-energy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20543

[services.development]
run = "pnpm --filter @workspace/northwave-energy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/northwave-energy", "run", "build" ]
publicDir = "artifacts/northwave-energy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20543"
BASE_PATH = "/"
